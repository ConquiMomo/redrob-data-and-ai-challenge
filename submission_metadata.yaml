ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude extensively throughout development: for architecture review
  (splitting the original single-file pipeline into a precompute/rank
  two-stage design to respect the ranking-step time budget), for finding
  and fixing concrete bugs (a tie-break ordering bug that caused the
  official validator to reject the submission; a false-positive bug in an
  early version of the skill-corroboration check that incorrectly flagged
  99/100 of a sample as fraudulent; a word-boundary substring-matching bug
  causing short tokens like "rag" and "ros" to false-match inside unrelated
  words like "storage" and "across"), and for design discussion on scoring
  weights (location handling, behavioral-signal down-weighting per the
  JD's explicit instruction, skill-list bloat / keyword-stuffing detection).
  All scoring logic, weight values, and design decisions were reviewed and
  approved by the human author; no candidate data was sent to any LLM
  outside of pasted code/log excerpts for debugging purposes.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Two-stage pipeline (precompute.py / rank.py) over the 100K-candidate pool.
  Stage 1 hard-filters on availability, experience floor, product-company
  tenure, and ML/AI skill presence (11,534 survivors). Stage 2 computes a
  consistency multiplier combining proficiency/duration mismatches,
  endorsement-uniformity (honeypot) detection, duplicate-description
  detection, explicit date-logic impossibility checks (skill duration
  exceeding career span, overlapping/simultaneous "current" jobs), and a
  YOE-vs-career-history mismatch check. Stage 3 builds per-candidate text
  for a BAAI/bge-small-en-v1.5 bi-encoder (512 token context) scored
  against three reference texts (distilled JD, ideal-candidate profile,
  negative/anti-pattern profile) to produce a single semantic score. A
  structured score blends YOE, product-company ratio, vector-DB/embedding/
  retrieval-systems skill depth, Python proficiency, notice period,
  location (multiplicative, not additive — see README), platform-assessment
  scores, and a credibility signal (verification badges, GitHub activity,
  process track record). Disqualifier multipliers penalize job-hopping,
  framework-only ("calls APIs, no systems depth") profiles, unsupported
  AI/ML skill claims (category-level corroboration against career-history
  text), and long notice periods. The top ~500 candidates by base score are
  reranked by a cross-encoder against two JD-derived signal prompts
  (production ownership, evaluation rigor, product-vs-services mentality)
  before final top-100 selection. Reasoning text is generated per candidate
  from the same signals used for scoring, with deterministic phrasing
  variation (hashed on candidate_id) to avoid templated-looking output
  across candidates who share underlying job-description text.

